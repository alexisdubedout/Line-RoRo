<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Line Rider — Roro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#fff;font-family:'Courier New',monospace}
#tb{
  position:fixed;top:0;left:0;right:0;height:50px;
  background:#fff;border-bottom:2px solid #222;
  display:flex;align-items:center;gap:10px;padding:0 14px;z-index:100;
}
.btn{
  padding:6px 14px;border-radius:4px;border:2px solid;
  font-family:'Courier New',monospace;font-size:12px;font-weight:700;
  cursor:pointer;letter-spacing:1px;white-space:nowrap;flex-shrink:0;
  transition:all 0.12s;background:#fff;
}
.btn:active{transform:scale(0.95)}
.sep{width:1px;height:30px;background:#ddd;flex-shrink:0}
#wrap{position:fixed;top:50px;left:0;right:0;bottom:0}
canvas{display:block}
#hint{
  position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
  font-size:10px;color:#bbb;pointer-events:none;letter-spacing:2px;
  background:#fff;padding:3px 12px;border:1px solid #eee;border-radius:20px;
  transition:opacity 0.5s;
}
</style>
</head>
<body>
<div id="tb">
  <button class="btn" id="b-draw">✏ DESSIN</button>
  <button class="btn" id="b-line">╱ LIGNE</button>
  <button class="btn" id="b-erase">⌫ GOMME</button>
  <div class="sep"></div>
  <button class="btn" id="b-play">▶ PLAY</button>
  <button class="btn" id="b-reset">↺ RESET</button>
  <button class="btn" id="b-clear">✕ CLEAR</button>
  <div class="sep"></div>
  <label style="font-size:10px;color:#888;flex-shrink:0">GRAVITÉ</label>
  <input type="range" id="grav" min="1" max="5" value="2" step="0.1" style="width:60px;flex-shrink:0">
  <span id="status" style="font-size:10px;color:#bbb;margin-left:auto;letter-spacing:1px">0 ligne</span>
</div>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="hint">CLIC SUR ✏ OU ╱ POUR CHANGER LA COULEUR · CLIC DROIT = DÉPLACER · MOLETTE = ZOOM</div>

const wrap = document.getElementById('wrap');
const canvas = document.getElementById('c');

let cam = { x:100, y:50, zoom:1 };
const w2s = (wx,wy) => ({ x:(wx-cam.x)*cam.zoom+W/2, y:(wy-cam.y)*cam.zoom+H/2 });
const s2w = (sx,sy) => ({ x:(sx-W/2)/cam.zoom+cam.x, y:(sy-H/2)/cam.zoom+cam.y });

// ═══════════════════════════════════════════════
// MATTER.JS ENGINE — config minimale et stable
// ═══════════════════════════════════════════════
const { Engine, Runner, Bodies, Body, World, Events, Constraint } = Matter;

const engine = Engine.create({
  gravity: { x:0, y:2 },
  positionIterations: 6,
  velocityIterations: 4,
});
const world = engine.world;
const runner = Runner.create({ delta:1000/60 });

// ═══════════════════════════════════════════════
// COULEURS / TYPES DE LIGNES
// ═══════════════════════════════════════════════
// Chaque type a : couleur visuelle, friction physique, label
const LINE_TYPES = [
  { label:'normal', hex:'#111', friction:0.05, name:'Normal'  },
  { label:'accel',  hex:'#c00', friction:0.00, name:'Accél'   },
  { label:'brake',  hex:'#06c', friction:0.00, name:'Frein'   },
];
let lineTypeIdx = 0;

function curType(){ return LINE_TYPES[lineTypeIdx]; }

// Style bouton actif selon couleur courante
function styleActiveTool(id){
  ['b-draw','b-line','b-erase'].forEach(bid=>{
    const b = document.getElementById(bid);
    b.style.background = '';
    b.style.color = '';
    if(bid==='b-erase'){
      b.style.borderColor='#888'; b.style.color='#888';
    } else {
      b.style.borderColor='#333'; b.style.color='#333';
    }
  });
  const btn = document.getElementById(id);
  if(id==='b-erase'){
    btn.style.background='#555'; btn.style.borderColor='#555'; btn.style.color='#fff';
  } else {
    const c = curType().hex;
    btn.style.background = c;
    btn.style.borderColor = c;
    btn.style.color = '#fff';
  }
}

// ═══════════════════════════════════════════════
// SEGMENTS DESSINÉS
// ═══════════════════════════════════════════════
let segments = []; // { pts, bodies, typeIdx }

function seg2bodies(pts, typeIdx){
  const t = LINE_TYPES[typeIdx];
  const out = [];
  for(let i=0;i<pts.length-1;i++){
    const a=pts[i], b=pts[i+1];
    const dx=b.x-a.x, dy=b.y-a.y;
    const len = Math.hypot(dx,dy);
    if(len < 2) continue;
    const body = Bodies.rectangle(
      (a.x+b.x)/2, (a.y+b.y)/2, len, 20,
      {
        isStatic: true,
        angle: Math.atan2(dy,dx),
        friction: t.friction,
        frictionStatic: t.friction,
        restitution: 0,
        label: t.label,
        collisionFilter: { category:0x0001, mask:0x0002 }
      }
    );
    World.add(world, body);
    out.push(body);
  }
  return out;
}

function simplifyPts(pts, tol=3){
  if(pts.length<3) return pts;
  const r=[pts[0]];
  for(let i=1;i<pts.length-1;i++){
    const prev=r[r.length-1];
    if(Math.hypot(pts[i].x-prev.x,pts[i].y-prev.y)>=tol) r.push(pts[i]);
  }
  r.push(pts[pts.length-1]);
  return r;
}

// ═══════════════════════════════════════════════
// RORO — physique ultra simplifiée
// Un seul point physique (cercle) qui glisse.
// Tout le dessin est relatif à ce point.
// ═══════════════════════════════════════════════
const START = { x:100, y:50 };
let roro = null;
let trail = [];
let playing = false;

function spawnRoro(){
  if(roro){ World.remove(world, roro.body); }
  trail = [];

  // Cercle unique = physique parfaite, glisse sans accrocher
  const body = Bodies.circle(START.x, START.y, 8, {
    friction: 0.005,
    frictionAir: 0.005,
    restitution: 0,
    label: 'roro',
    collisionFilter: { category:0x0002, mask:0x0001 }
  });
  body.isBullet = true;
  World.add(world, body);
  roro = { body };
}

// Accel & brake via collision
Events.on(engine,'collisionActive', e=>{
  if(!roro) return;
  e.pairs.forEach(pair=>{
    const isRoro = b => b.label==='roro';
    const isLine = b => b.label==='accel'||b.label==='brake';
    const rb  = isRoro(pair.bodyA)?pair.bodyA:isRoro(pair.bodyB)?pair.bodyB:null;
    const seg = isLine(pair.bodyA)?pair.bodyA:isLine(pair.bodyB)?pair.bodyB:null;
    if(!rb||!seg) return;

    if(seg.label==='accel'){
      // Force dans le sens de la pente
      Body.applyForce(rb, rb.position, {
        x: Math.cos(seg.angle) * 0.15 * rb.mass,
        y: Math.sin(seg.angle) * 0.15 * rb.mass
      });
    } else if(seg.label==='brake'){
      // Réduction directe de vitesse
      Body.setVelocity(rb, {
        x: rb.velocity.x * 0.7,
        y: rb.velocity.y * 0.7
      });
    }
  });
});

// Camera follow
Events.on(engine,'afterUpdate',()=>{
  if(!roro||!playing) return;
  const bx = roro.body.position.x;
  const by = roro.body.position.y;
  cam.x += (bx - cam.x)*0.1;
  cam.y += (by - cam.y)*0.1;
  trail.push({x:bx, y:by});
  if(trail.length>600) trail.shift();
});

// ═══════════════════════════════════════════════
// DESSIN DE RORO
// Tout relatif à la position du cercle physique
// ═══════════════════════════════════════════════
function drawRoro(){
  if(!roro) return;
  const z = cam.zoom;
  const p = w2s(roro.body.position.x, roro.body.position.y);

  // On estime l'angle de la pente via la vélocité
  const vx = roro.body.velocity.x, vy = roro.body.velocity.y;
  const spd = Math.hypot(vx,vy);
  // Angle de la luge = direction du mouvement (si assez rapide)
  const angle = spd > 0.5 ? Math.atan2(vy, vx) : 0;

  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(angle);

  // ── Luge ──
  ctx.fillStyle = '#4ECBA0';
  ctx.beginPath();
  ctx.roundRect(-26*z, 2*z, 52*z, 8*z, 4*z);
  ctx.fill();
  // Patins
  ctx.strokeStyle='#1D9E75'; ctx.lineWidth=2*z; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-22*z,10*z); ctx.lineTo(-28*z,14*z); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(22*z,10*z);  ctx.lineTo(28*z,14*z);  ctx.stroke();

  // ── Jambes (pliées, position assise) ──
  ctx.strokeStyle='#E8A060'; ctx.lineWidth=5*z; ctx.lineCap='round';
  // Cuisse G
  ctx.beginPath(); ctx.moveTo(-5*z,0); ctx.lineTo(-12*z,-12*z); ctx.stroke();
  // Tibia G
  ctx.beginPath(); ctx.moveTo(-12*z,-12*z); ctx.lineTo(-18*z,2*z); ctx.stroke();
  // Cuisse D
  ctx.beginPath(); ctx.moveTo(5*z,0); ctx.lineTo(12*z,-12*z); ctx.stroke();
  // Tibia D
  ctx.beginPath(); ctx.moveTo(12*z,-12*z); ctx.lineTo(18*z,2*z); ctx.stroke();
  // Genoux
  ctx.fillStyle='#c07840';
  ctx.beginPath(); ctx.arc(-12*z,-12*z,3*z,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(12*z,-12*z,3*z,0,Math.PI*2); ctx.fill();

  // ── Corps ──
  ctx.fillStyle='#534AB7';
  ctx.beginPath(); ctx.roundRect(-7*z,-30*z,14*z,30*z,4*z); ctx.fill();
  // Col
  ctx.fillStyle='#7F77DD';
  ctx.beginPath(); ctx.roundRect(-7*z,-30*z,14*z,7*z,3*z); ctx.fill();

  // ── Bras G ──
  ctx.strokeStyle='#AFA9EC'; ctx.lineWidth=5*z;
  ctx.beginPath(); ctx.moveTo(-7*z,-24*z); ctx.lineTo(-20*z,-14*z); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-20*z,-14*z); ctx.lineTo(-24*z,2*z); ctx.stroke();
  ctx.fillStyle='#534AB7'; ctx.beginPath(); ctx.arc(-7*z,-24*z,3.5*z,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#E8A060'; ctx.beginPath(); ctx.arc(-24*z,2*z,3*z,0,Math.PI*2); ctx.fill();

  // ── Bras D ──
  ctx.strokeStyle='#AFA9EC'; ctx.lineWidth=5*z;
  ctx.beginPath(); ctx.moveTo(7*z,-24*z); ctx.lineTo(20*z,-14*z); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(20*z,-14*z); ctx.lineTo(24*z,2*z); ctx.stroke();
  ctx.fillStyle='#534AB7'; ctx.beginPath(); ctx.arc(7*z,-24*z,3.5*z,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#E8A060'; ctx.beginPath(); ctx.arc(24*z,2*z,3*z,0,Math.PI*2); ctx.fill();

  ctx.restore();

  // ── Tête — toujours droite (pas de rotation) ──
  const hr = 16*z;
  // Photo dans cercle
  ctx.save();
  ctx.translate(p.x, p.y - 46*z);
  ctx.beginPath(); ctx.arc(0,0,hr,0,Math.PI*2); ctx.clip();
  if(roroImg.complete && roroImg.naturalWidth>0){
    ctx.drawImage(roroImg,-hr,-hr,hr*2,hr*2);
  } else {
    ctx.fillStyle='#E8A060'; ctx.fill();
  }
  ctx.restore();

  // Contour tête
  ctx.save();
  ctx.translate(p.x, p.y - 46*z);
  ctx.beginPath(); ctx.arc(0,0,hr,0,Math.PI*2);
  ctx.strokeStyle='#333'; ctx.lineWidth=2*z; ctx.stroke();

  // Bonnet
  ctx.fillStyle='#cc1111';
  ctx.beginPath();
  ctx.ellipse(0,-hr+2,hr*0.9,hr*0.45,0,Math.PI,0);
  ctx.fill();
  ctx.fillStyle='#ee3333';
  ctx.fillRect(-hr*0.9,-hr+2,hr*1.8,hr*0.18);
  // Pompon
  ctx.beginPath(); ctx.arc(0,-hr-4,4*z,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();

  // Écharpe
  ctx.fillStyle='#FAC775';
  ctx.beginPath(); ctx.roundRect(-9*z,hr-4*z,18*z,7*z,3*z); ctx.fill();
  ctx.restore();
}

// ═══════════════════════════════════════════════
// RENDU PRINCIPAL
// ═══════════════════════════════════════════════
function drawGrid(){
  const step=100, z=cam.zoom;
  const x0=Math.floor((cam.x-W/z/2)/step)*step;
  const y0=Math.floor((cam.y-H/z/2)/step)*step;
  ctx.strokeStyle='rgba(0,0,0,0.05)'; ctx.lineWidth=1;
  for(let x=x0;x<x0+W/z+step*2;x+=step){
    const p=w2s(x,0); ctx.beginPath(); ctx.moveTo(p.x,0); ctx.lineTo(p.x,H); ctx.stroke();
  }
  for(let y=y0;y<y0+H/z+step*2;y+=step){
    const p=w2s(0,y); ctx.beginPath(); ctx.moveTo(0,p.y); ctx.lineTo(W,p.y); ctx.stroke();
  }
}

function drawSegments(){
  segments.forEach(seg=>{
    if(seg.pts.length<2) return;
    const col = LINE_TYPES[seg.typeIdx].hex;
    ctx.beginPath();
    const p0=w2s(seg.pts[0].x,seg.pts[0].y); ctx.moveTo(p0.x,p0.y);
    seg.pts.slice(1).forEach(pt=>{ const p=w2s(pt.x,pt.y); ctx.lineTo(p.x,p.y); });
    ctx.strokeStyle=col; ctx.lineWidth=3*cam.zoom; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.stroke();
  });
}

function drawTrail(){
  if(trail.length<2) return;
  ctx.beginPath();
  const p0=w2s(trail[0].x,trail[0].y); ctx.moveTo(p0.x,p0.y);
  trail.slice(1).forEach(pt=>{ const p=w2s(pt.x,pt.y); ctx.lineTo(p.x,p.y); });
  ctx.strokeStyle='rgba(83,74,183,0.15)'; ctx.lineWidth=2; ctx.lineCap='round'; ctx.stroke();
}

function drawCurrentStroke(){
  if(!isDrawing||curPts.length<2) return;
  const col = curType().hex;
  ctx.beginPath();
  const p0=w2s(curPts[0].x,curPts[0].y); ctx.moveTo(p0.x,p0.y);
  if(tool==='line'){
    const pe=w2s(curPts[curPts.length-1].x,curPts[curPts.length-1].y);
    ctx.lineTo(pe.x,pe.y);
  } else {
    curPts.slice(1).forEach(pt=>{ const p=w2s(pt.x,pt.y); ctx.lineTo(p.x,p.y); });
  }
  ctx.strokeStyle=col; ctx.lineWidth=3*cam.zoom;
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.globalAlpha=0.4; ctx.stroke(); ctx.globalAlpha=1;
}

function drawEraseCircle(){
  if(tool!=='erase'||!mousePos) return;
  ctx.beginPath(); ctx.arc(mousePos.x,mousePos.y,ERASE_R,0,Math.PI*2);
  ctx.strokeStyle='rgba(200,0,0,0.5)'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.fillStyle='rgba(200,0,0,0.05)'; ctx.fill();
}

function drawStartMarker(){
  if(playing) return;
  const p=w2s(START.x,START.y);
  ctx.strokeStyle='#ccc'; ctx.lineWidth=cam.zoom;
  ctx.beginPath(); ctx.arc(p.x,p.y,10*cam.zoom,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle='#ccc'; ctx.font=`bold ${10*cam.zoom}px Courier New`;
  ctx.textAlign='center'; ctx.fillText('RORO',p.x,p.y-14*cam.zoom);
}

function render(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
  drawGrid();
  drawTrail();
  drawSegments();
  drawCurrentStroke();
  drawEraseCircle();
  drawStartMarker();
  drawRoro();
}
requestAnimationFrame(function loop(){ requestAnimationFrame(loop); render(); });

// ═══════════════════════════════════════════════
// GESTION SOURIS / TACTILE
// ═══════════════════════════════════════════════
let tool='draw', isDrawing=false, isPanning=false;
let curPts=[], mousePos=null;
let panStart={x:0,y:0}, camStart={x:0,y:0};
const ERASE_R=22;

function getPos(e){
  const r=canvas.getBoundingClientRect(), s=e.touches?e.touches[0]:e;
  return { sx:s.clientX-r.left, sy:s.clientY-r.top };
}

canvas.addEventListener('contextmenu',e=>e.preventDefault());
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  cam.zoom=Math.max(0.15,Math.min(6,cam.zoom*(e.deltaY>0?0.88:1.14)));
},{passive:false});
canvas.addEventListener('mousedown',onDown);
canvas.addEventListener('mousemove',onMove);
canvas.addEventListener('mouseup',onUp);
canvas.addEventListener('touchstart',e=>{e.preventDefault();onDown(e);},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();onMove(e);},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();onUp(e);},{passive:false});

function onDown(e){
  const {sx,sy}=getPos(e);
  if(e.button===1||e.button===2){ isPanning=true; panStart={x:sx,y:sy}; camStart={x:cam.x,y:cam.y}; return; }
  if(tool==='erase'){ eraseAt(sx,sy); return; }
  isDrawing=true; curPts=[s2w(sx,sy)];
}
function onMove(e){
  const {sx,sy}=getPos(e);
  mousePos={x:sx,y:sy};
  if(isPanning){ cam.x=camStart.x-(sx-panStart.x)/cam.zoom; cam.y=camStart.y-(sy-panStart.y)/cam.zoom; return; }
  if(isDrawing){
    const wp=s2w(sx,sy);
    if(tool==='line'){ curPts=[curPts[0],wp]; }
    else { const last=curPts[curPts.length-1]; if(Math.hypot(wp.x-last.x,wp.y-last.y)>2) curPts.push(wp); }
  }
  if(tool==='erase'&&(e.buttons===1||(e.touches&&e.touches.length))) eraseAt(sx,sy);
}
function onUp(){
  if(isPanning){isPanning=false;return;}
  if(isDrawing&&curPts.length>1){
    const pts=tool==='line'?[curPts[0],curPts[curPts.length-1]]:simplifyPts(curPts,2.5);
    const bodies=seg2bodies(pts,lineTypeIdx);
    segments.push({pts,bodies,typeIdx:lineTypeIdx});
  }
  isDrawing=false; curPts=[];
}
function eraseAt(sx,sy){
  const rm=new Set();
  segments.forEach(seg=>{
    for(const pt of seg.pts){
      const p=w2s(pt.x,pt.y);
      if(Math.hypot(p.x-sx,p.y-sy)<ERASE_R){rm.add(seg);break;}
    }
  });
  rm.forEach(seg=>seg.bodies.forEach(b=>World.remove(world,b)));
  segments=segments.filter(s=>!rm.has(s));
}

// ═══════════════════════════════════════════════
// BOUTONS TOOLBAR
// ═══════════════════════════════════════════════
function selectTool(t){
  tool=t; isDrawing=false; curPts=[];
  canvas.style.cursor=t==='erase'?'none':'crosshair';
  styleActiveTool('b-'+t==='draw'?'draw':t==='line'?'line':'erase');
}

document.getElementById('b-draw').onclick=()=>{
  if(tool==='draw'){ lineTypeIdx=(lineTypeIdx+1)%LINE_TYPES.length; }
  tool='draw'; canvas.style.cursor='crosshair';
  styleActiveTool('b-draw');
};
document.getElementById('b-line').onclick=()=>{
  if(tool==='line'){ lineTypeIdx=(lineTypeIdx+1)%LINE_TYPES.length; }
  tool='line'; canvas.style.cursor='crosshair';
  styleActiveTool('b-line');
};
document.getElementById('b-erase').onclick=()=>{
  tool='erase'; canvas.style.cursor='none';
  styleActiveTool('b-erase');
};

const bPlay=document.getElementById('b-play');
bPlay.onclick=()=>{
  if(!playing){
    playing=true; spawnRoro(); cam.x=START.x; cam.y=START.y;
    Runner.run(runner,engine);
    bPlay.textContent='⏸ PAUSE';
    bPlay.style.background='#070'; bPlay.style.borderColor='#070'; bPlay.style.color='#fff';
    document.getElementById('hint').style.opacity='0';
  } else {
    playing=false; Runner.stop(runner);
    bPlay.textContent='▶ PLAY';
    bPlay.style.background=''; bPlay.style.borderColor='#070'; bPlay.style.color='#070';
  }
};
document.getElementById('b-reset').onclick=()=>{
  playing=false; Runner.stop(runner);
  if(roro){ World.remove(world,roro.body); roro=null; }
  trail=[]; cam.x=START.x; cam.y=START.y;
  bPlay.textContent='▶ PLAY';
  bPlay.style.background=''; bPlay.style.borderColor='#070'; bPlay.style.color='#070';
  document.getElementById('hint').style.opacity='1';
};
document.getElementById('b-clear').onclick=()=>{
  if(!confirm('Tout effacer ?')) return;
  playing=false; Runner.stop(runner);
  segments.forEach(s=>s.bodies.forEach(b=>World.remove(world,b))); segments=[];
  if(roro){ World.remove(world,roro.body); roro=null; }
  trail=[]; isDrawing=false; curPts=[];
  cam.x=START.x; cam.y=START.y;
  bPlay.textContent='▶ PLAY';
  bPlay.style.background=''; bPlay.style.borderColor='#070'; bPlay.style.color='#070';
  document.getElementById('hint').style.opacity='1';
};

document.getElementById('grav').oninput=function(){ engine.gravity.y=parseFloat(this.value); };

setInterval(()=>{
  document.getElementById('status').textContent=segments.length+' ligne'+(segments.length>1?'s':'');
},400);

window.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.code==='Space'){e.preventDefault();bPlay.click();}
  if(e.code==='KeyD') document.getElementById('b-draw').click();
  if(e.code==='KeyL') document.getElementById('b-line').click();
  if(e.code==='KeyE') document.getElementById('b-erase').click();
  if(e.code==='KeyR') document.getElementById('b-reset').click();
  if(e.code==='KeyC'){ lineTypeIdx=(lineTypeIdx+1)%LINE_TYPES.length; styleActiveTool('b-'+tool==='erase'?'erase':tool==='line'?'line':'draw'); }
});

// Init
styleActiveTool('b-draw');
</script>
</body>
